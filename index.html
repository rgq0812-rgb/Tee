<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE CHOSE - ONYX V2</title>
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#c9964a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="THE CHOSE" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root" style="background:#000;color:#c9964a;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;font-weight:bold;letter-spacing:0.2em;">
      IA ONYX EN COURS...
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.includes('IA ONYX EN COURS...')) {
           root.style.background = 'red';
           root.style.color = 'white';
           root.innerHTML = '<div style="padding:20px;text-align:center;"><h1>ERREUR CHARGEMENT MODULE</h1><p>Le script d\'initialisation ONYX n\'a pas répondu. Vérifiez la console.</p></div>';
        }
      }, 10000);
    </script>
  </body>
</html>
